# Marco Zero Cosméticos — Reverse proxy Nginx
# - Escuta na porta 80 (publicada pelo NSG-Public)
# - Encaminha para a aplicação Node.js rodando em 127.0.0.1:3000 (PM2)
# - Reescreve cabeçalhos para preservar IP real do cliente
# - Gzip básico para respostas JSON/HTML

upstream marcozero_app {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Tamanho máximo de upload (reservado para uploads futuros)
    client_max_body_size 5M;

    # Logs específicos da aplicação (úteis para auditoria do lab)
    access_log /var/log/nginx/marcozero.access.log;
    error_log  /var/log/nginx/marcozero.error.log warn;

    # Compressão de respostas JSON/HTML
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        text/css
        text/plain
        text/html
        text/xml;

    # Health check direto — útil para load balancer futuro
    location = /healthz {
        access_log off;
        return 200 'nginx ok\n';
        add_header Content-Type text/plain;
    }

    location / {
        proxy_pass         http://marcozero_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }
}
